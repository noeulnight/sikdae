packages:
  - apps/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24.13.1
  typescript: ^5.9.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.1.24
  express: ^5.2.1
  "@types/express": ^5.0.6
  tsx: ^4.22.4
  axios: ^1.17.0
  dotenv: ^17.4.2
  ioredis: ^5.11.1
  "@nestjs/common": ^11.1.26
  "@nestjs/core": ^11.1.26
  "@nestjs/platform-express": ^11.1.26
  "@nestjs/config": ^4.0.4
  reflect-metadata: ^0.2.2
  rxjs: ^7.8.2
  joi: ^18.2.1
  class-transformer: ^0.5.1
  class-validator: ^0.15.1
  "@nestjs/cli": ^11.0.22
  "@nestjs/schematics": ^11.1.0
  "@nestjs/testing": ^11.1.26
  ts-loader: ^9.6.0
  ts-node: ^10.9.2
  tsconfig-paths: ^4.2.0
  source-map-support: ^0.5.21
  "@nestjs/axios": ^4.0.1
  "@nestjs/swagger": ^11.4.4
  tailwindcss: ^4.3.0
  "@tailwindcss/vite": ^4.3.0
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  shadcn: ^4.11.0
  class-variance-authority: ^0.7.1
  tw-animate-css: ^1.4.0
  radix-ui: ^1.5.0
  lucide-react: ^1.17.0
  "@tanstack/react-query": ^5.101.0
  pretendard: ^1.3.9
  leaflet: ^1.9.4
  "@types/leaflet": ^1.9.21
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@scarf/scarf": false
  esbuild: true
